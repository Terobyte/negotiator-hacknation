vertical: plumbing
version: 1
contract_compatibility:
  profile: plumbing-v1
  status: schema_skeleton_only

runtime:
  live_enabled: false
  sim_enabled: true
  tts_cache_enabled: true
  recording_fallback_enabled: true
  stt_watchdog_s: 10
  prewarm_timeout_s: 15
  recording_fixture: recorded_fallback.json

disclosure:
  opening: "Hi, I'm an AI assistant calling on behalf of a client."

taxonomy:
  estimate_types: [fixed, time_and_materials, diagnostic]
  fee_codes:
    1: service_call
    2: labor
    3: parts
    4: permit
    5: emergency
    6: travel
    7: disposal
    8: excavation
    9: restoration
    10: equipment
    11: after_hours
    12: warranty
    13: tax
    14: inspection

benchmarks:
  currency: USD
  low: 450
  high: 1800

voss:
  labels:
    - "It sounds like certainty on the final bill matters here."
    - "It seems there may be more detail behind that number."
  calibrated_questions:
    - "How am I supposed to make that work?"
    - "What would it take to make this workable?"
  mirrors:
    - "That includes labor and parts?"
  stalls:
    - "One moment while I check my notes."
    - "Give me a second to verify that."
    - "Let me make sure I have the right record."

anchoring:
  require_ledger_fact: true
  prefer_counterparty_first: true

privacy:
  never_speak:
    - budget_ceiling
    - opponent_floor
    - price_corridor
    - system_prompt

gate:
  fail_closed: true
  regenerate_on_block: true

demo_number_map: {}
