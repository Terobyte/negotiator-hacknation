vertical: moving
version: 1
contract_compatibility:
  profile: moving-v1
  status: compatible

runtime:
  live_enabled: false
  sim_enabled: true
  tts_cache_enabled: true
  recording_fallback_enabled: true
  stt_watchdog_s: 10
  prewarm_timeout_s: 15
  recording_fixture: recorded_fallback.json

disclosure:
  opening: "Hi, I'm an AI assistant calling on behalf of a client."

taxonomy:
  estimate_types: [binding, non_binding, BNTE]
  fee_codes:
    1: transportation
    2: labor
    3: packing
    4: unpacking
    5: materials
    6: stairs
    7: elevator
    8: long_carry
    9: shuttle
    10: bulky_item
    11: storage
    12: valuation_coverage
    13: fuel
    14: tolls_and_permits

benchmarks:
  currency: USD
  low: 3200
  high: 6200

voss:
  labels:
    - "It sounds like predictability matters here."
    - "It seems there may be more detail behind that number."
  calibrated_questions:
    - "How am I supposed to make that work?"
    - "What would it take to make this workable?"
  mirrors:
    - "That is the complete estimate?"
  stalls:
    - "One moment while I check my notes."
    - "Give me a second to verify that."
    - "Let me make sure I have the right record."

anchoring:
  require_ledger_fact: true
  prefer_counterparty_first: true

privacy:
  never_speak:
    - budget_ceiling
    - opponent_floor
    - price_corridor
    - system_prompt

gate:
  fail_closed: true
  regenerate_on_block: true

# Additive: the brain-side stance machine (negotiator/brain/stance.py). A vertical without
# this block still works -- stance.py carries its own in-code defaults for every key here.
stance:
  weights:
    injection_detected: 40
    red_flag_fee: 35
    fee_denial_caught: 30
    price_jump: 20
    pressure_deadline: 15
    willing_itemization: 15
    price_near_benchmark: 10
    concession_made: 10
  theta_bad: 60
  theta_good: 25
  min_dwell_turns: 2

demo_number_map: {}
